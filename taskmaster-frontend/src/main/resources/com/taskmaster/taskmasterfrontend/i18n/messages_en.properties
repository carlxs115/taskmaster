about.terms.content=TERMS OF USE\n\nWelcome to TaskMaster. Thanks for using our application. By using it, you are agreeing to these terms. Please read them carefully. If you do not agree, please do not use the application.\n\nTaskMaster is an application developed exclusively for academic purposes as a Final Degree Project (TFG) for the Multiplatform Application Development vocational training programme.\n\n1. PERMITTED USE\nThis application is designed for personal and educational use. It is not intended for commercial production environments. Do not misuse the application or attempt to access it by methods other than those intended.\n\n2. YOUR ACCOUNT\nYou are responsible for maintaining the confidentiality of your password and for all activity that occurs on your account. We recommend not reusing your password in other applications.\n\n3. USER DATA\nData entered into the application (tasks, projects, profile) is stored locally in the configured database. The user is responsible for their own data. Please refer to the Privacy Policy for more information.\n\n4. USER CONTENT\nYou retain ownership of all content you create within the application. What belongs to you stays yours.\n\n5. LIMITATION OF LIABILITY\nThe application is provided "as is". The author is not responsible for data loss or any direct or indirect damage resulting from the use of this application.\n\n6. INTELLECTUAL PROPERTY\nThe source code of TaskMaster is the property of the author. Reproduction, distribution or reverse engineering without express written permission is prohibited.\n\n7. MODIFICATIONS\nThese terms may be updated to reflect improvements to the application. Any relevant changes will be notified.\n\nFor any enquiries, please contact the author through the academic channels of the institution.\n\nLast revision: 2026.
about.privacy.content=PRIVACY POLICY\n\nTaskMaster is a desktop application for personal and academic use. All information you enter into the application is stored exclusively on your own device. The author has no access to any of your data at any time.\n\n1. DATA STORED\n\u2022 Username and password (encrypted with BCrypt)\n\u2022 Profile data: first name, last name, email, date of birth\n\u2022 Tasks, projects, time logs and activity records\n\u2022 Profile photo (stored locally)\n\u2022 Preferences: language, theme, date and time format\n\n2. WHY DATA IS COLLECTED\nData is used solely for the operation of the application: providing its features, maintaining the active session and personalising the experience. It is never transmitted, shared or stored outside your device.\n\n3. YOUR PRIVACY CONTROLS\nYou retain all rights over your data. TaskMaster has no access to your information at any time, as all data resides exclusively on your local device.\n\n4. STORAGE\nAll data is stored in the local database on your device (H2 or PostgreSQL depending on configuration). Theme and language preferences are saved in the user directory (~/.taskmaster/). The author of the application has no access to any of this data at any time.\n\n5. DATA RETENTION AND DELETION\nData is retained for as long as the account is active on your device. Users can edit or delete their account and all associated data at any time from the Security section. Once the account is deleted, all associated data is permanently removed from your device.\n\n6. USER RIGHTS\nYou can access, modify or delete your personal information at any time from the Profile and Security sections of the application.\n\n7. CHANGES TO THIS POLICY\nIf this privacy policy changes in the future, it will be notified prominently within the application. The date of the latest revision will always be indicated.\n\nLast updated: 2026.
about.acknowledgements.content=ACKNOWLEDGEMENTS\n\nTaskMaster was developed using the following open-source technologies, tools and resources:\n\n\u2022 OpenJFX (JavaFX) \u2014 Java UI framework.\n  License: GPL v2 + Classpath Exception\n  https://openjfx.io\n\n\u2022 Spring Boot \u2014 Java backend framework.\n  License: Apache 2.0\n  https://spring.io\n\n\u2022 Hibernate / Spring Data JPA \u2014 ORM and persistence.\n  License: LGPL 2.1 / Apache 2.0\n\n\u2022 H2 Database \u2014 Embedded database for development.\n  License: MPL 2.0 / EPL 1.0\n  https://h2database.com\n\n\u2022 Jackson \u2014 JSON serialization.\n  License: Apache 2.0\n\n\u2022 Lombok \u2014 Java boilerplate reduction.\n  License: MIT\n  https://projectlombok.org\n\n\u2022 IntelliJ IDEA \u2014 Development environment.\n  JetBrains s.r.o.\n\nSpecial thanks to the DAM faculty for their guidance and support throughout the development of this project.
