about.terms.content=T\u00c9RMINOS DE USO\n\nBienvenido a TaskMaster. Gracias por usar nuestra aplicaci\u00f3n. Al utilizarla, aceptas estos t\u00e9rminos. L\u00e9elos detenidamente. Si no est\u00e1s de acuerdo, por favor deja de usar la aplicaci\u00f3n.\n\nTaskMaster es una aplicaci\u00f3n desarrollada exclusivamente con fines acad\u00e9micos como Trabajo de Fin de Grado (TFG) del ciclo formativo de Desarrollo de Aplicaciones Multiplataforma.\n\n1. USO PERMITIDO\nEsta aplicaci\u00f3n est\u00e1 dise\u00f1ada para uso personal y educativo. No est\u00e1 destinada a entornos de producci\u00f3n comercial. No uses la aplicaci\u00f3n de forma indebida ni intentes acceder a ella por m\u00e9todos distintos a los previstos.\n\n2. TU CUENTA\nEres responsable de mantener la confidencialidad de tu contrase\u00f1a y de toda la actividad que ocurra en tu cuenta. Se recomienda no reutilizar la contrase\u00f1a en otras aplicaciones.\n\n3. DATOS DEL USUARIO\nLos datos introducidos en la aplicaci\u00f3n (tareas, proyectos, perfil) se almacenan localmente en la base de datos configurada. El usuario es responsable de sus propios datos. Consulta la Pol\u00edtica de Privacidad para m\u00e1s informaci\u00f3n.\n\n4. CONTENIDO DEL USUARIO\nConservas la propiedad de todo el contenido que crees dentro de la aplicaci\u00f3n. Lo que es tuyo sigue siendo tuyo.\n\n5. LIMITACI\u00d3N DE RESPONSABILIDAD\nLa aplicaci\u00f3n se proporciona "tal cual". El autor no se hace responsable de p\u00e9rdidas de datos ni de cualquier da\u00f1o directo o indirecto derivado del uso de esta aplicaci\u00f3n.\n\n6. PROPIEDAD INTELECTUAL\nEl c\u00f3digo fuente de TaskMaster es propiedad del autor. Queda prohibida su reproducci\u00f3n, distribuci\u00f3n o ingenier\u00eda inversa sin permiso expreso y por escrito.\n\n7. MODIFICACIONES\nEstos t\u00e9rminos pueden actualizarse para reflejar mejoras en la aplicaci\u00f3n. Se notificar\u00e1 cualquier cambio relevante.\n\nPara cualquier consulta, contacta con el autor a trav\u00e9s de los canales acad\u00e9micos del centro.\n\n\u00daltima revisi\u00f3n: 2026.
about.privacy.content=POL\u00cdTICA DE PRIVACIDAD\n\nTaskMaster es una aplicaci\u00f3n de escritorio de uso personal y acad\u00e9mico. Toda la informaci\u00f3n que introduces en la aplicaci\u00f3n se almacena exclusivamente en tu propio equipo. El autor no tiene acceso a ning\u00fan dato tuyo en ning\u00fan momento.\n\n1. DATOS QUE SE ALMACENAN\n\u2022 Nombre de usuario y contrase\u00f1a (cifrada con BCrypt)\n\u2022 Datos de perfil: nombre, apellidos, email, fecha de nacimiento\n\u2022 Tareas, proyectos, registros de tiempo y actividad\n\u2022 Foto de perfil (almacenada localmente)\n\u2022 Preferencias: idioma, tema y formato de fecha/hora\n\n2. POR QU\u00c9 SE RECOGEN LOS DATOS\nLos datos se usan \u00fanicamente para el funcionamiento de la aplicaci\u00f3n: ofrecer las funcionalidades, mantener la sesi\u00f3n activa y personalizar la experiencia. En ning\u00fan caso se transmiten, comparten ni almacenan fuera de tu equipo.\n\n3. TUS CONTROLES DE PRIVACIDAD\nConservas todos los derechos sobre tus datos. TaskMaster no tiene acceso a tu informaci\u00f3n en ning\u00fan momento, ya que toda la informaci\u00f3n reside \u00fanicamente en tu dispositivo local.\n\n4. ALMACENAMIENTO\nTodos los datos se almacenan en la base de datos local de tu equipo (H2 o PostgreSQL seg\u00fan configuraci\u00f3n). Las preferencias de tema e idioma se guardan en el directorio del usuario (~/.taskmaster/). El autor de la aplicaci\u00f3n no tiene acceso a ninguno de estos datos en ning\u00fan momento.\n\n5. RETENCI\u00d3N Y ELIMINACI\u00d3N DE DATOS\nLos datos se conservan mientras la cuenta est\u00e9 activa en tu equipo. El usuario puede editar o eliminar su cuenta y todos sus datos en cualquier momento desde la secci\u00f3n de Seguridad. Una vez eliminada la cuenta, todos los datos asociados se borran permanentemente de tu dispositivo.\n\n6. DERECHOS DEL USUARIO\nPuedes acceder, modificar o eliminar tu informaci\u00f3n personal en cualquier momento desde las secciones de Perfil y Seguridad de la aplicaci\u00f3n.\n\n7. CAMBIOS EN ESTA POL\u00cdTICA\nSi esta pol\u00edtica de privacidad cambia en el futuro, se notificar\u00e1 de forma visible dentro de la aplicaci\u00f3n. Siempre se indicar\u00e1 la fecha de la \u00faltima revisi\u00f3n.\n\nFecha de \u00faltima actualizaci\u00f3n: 2026.
