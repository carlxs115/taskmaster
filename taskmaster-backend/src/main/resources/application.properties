# ----- SERVIDOR -----
server.port=8080

spring.application.name=taskmaster

# ----- H2 -----
spring.datasource.url=jdbc:h2:mem:taskmasterdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----- JPA -----
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ----- LOGS -----
logging.level.com.taskmaster=DEBUG
logging.level.org.springframework.security=DEBUG

# ----- ALMACENAMIENTO DE AVATARES -----
# Directorio donde se guardan las fotos de perfil (multiplataforma, fuera del proyecto).
# Nota: mientras la BD sea H2 en memoria, los ficheros huérfanos se limpian al arrancar.
taskmaster.storage.avatars-dir=${user.home}/.taskmaster/avatars

# Límite de tamaño de subida (se usará en el siguiente commit con el endpoint multipart)
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB