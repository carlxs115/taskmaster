# =============================================================================
# TASKMASTER — CONFIGURACIÓN DE LA APLICACIÓN
# =============================================================================

# ----- SERVIDOR -----
# Puerto en el que escucha el backend Spring Boot (localhost:8080)
server.port=8080
spring.application.name=taskmaster

# ----- BASE DE DATOS (SQLite) -----
# La base de datos se almacena en el directorio personal del usuario,
# en una carpeta oculta .taskmaster para no ensuciar el escritorio.
# Ejemplo en Windows: C:\Users\Carlos\.taskmaster\taskmaster.db
# Ejemplo en Linux:   /home/carlos/.taskmaster/taskmaster.db
spring.datasource.url=jdbc:sqlite:${user.home}/.taskmaster/taskmaster.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# ----- JPA / HIBERNATE -----
# IMPORTANTE: cambiar a 'validate' o 'none' antes de la entrega final
# para evitar modificaciones automáticas del esquema con datos reales.
# 'update' es seguro en desarrollo porque crea tablas si no existen.
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL en consola — útil en desarrollo, desactivar en producción
# Cambiar a 'false' antes de la entrega final
spring.jpa.show-sql=true

# Formatea el SQL en múltiples líneas para mayor legibilidad en los logs
spring.jpa.properties.hibernate.format_sql=true

# Dialecto específico para SQLite (proporcionado por hibernate-community-dialects)
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Activa las foreign keys en SQLite (desactivadas por defecto en SQLite)
# Sin esto, las relaciones entre tablas no se validan a nivel de BD
spring.jpa.properties.hibernate.connection.foreign_keys=true

# Desactiva el patrón Open Session in View para evitar queries lazy
# inesperadas fuera de la capa de servicio
spring.jpa.open-in-view=false

# ----- LOGS -----
# Nivel DEBUG útil en desarrollo para ver el detalle de cada petición.
# Cambiar a INFO antes de la entrega final para reducir el ruido en consola.
logging.level.com.taskmaster=DEBUG
logging.level.org.springframework.security=DEBUG

# ----- ALMACENAMIENTO DE AVATARES -----
# Directorio donde se guardan las fotos de perfil de los usuarios.
# Se crea automáticamente al arrancar si no existe (AvatarStorageService.init())
taskmaster.storage.avatars-dir=${user.home}/.taskmaster/avatars

# ----- MULTIPART (subida de ficheros) -----
# Tamaño máximo del fichero de avatar permitido (coincide con la validación
# en AvatarService.MAX_SIZE_BYTES = 2 * 1024 * 1024)
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB